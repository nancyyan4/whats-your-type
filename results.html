<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your type — What's your type?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-results">
  <main class="container container--results">
    <div id="results-empty" class="results-empty" hidden>
      <div class="card card-empty">
        <p class="empty-icon" aria-hidden="true">💔</p>
        <h1>No results yet</h1>
        <p class="empty-text">Pick some fictional crushes first and we'll tell you what it means.</p>
        <a href="index.html" class="btn btn-primary">Find my type</a>
      </div>
    </div>

    <div id="results-content" class="results-stack" hidden>
      <article class="card card-hero" id="capture-hero">
        <p class="eyebrow">Your type is</p>
        <h1 id="type-title" class="type-title"></h1>
        <p id="type-summary" class="type-summary"></p>
      </article>

      <article class="card">
        <h2 class="card-heading">
          <span class="card-icon" aria-hidden="true">🧠</span>
          MBTI breakdown
        </h2>
        <ul id="mbti-list" class="mbti-list"></ul>
      </article>

      <article class="card card-green">
        <h2 class="card-heading">
          <span class="card-icon" aria-hidden="true">💚</span>
          Green flags
        </h2>
        <ul id="green-flags" class="flag-list"></ul>
      </article>

      <article class="card card-red">
        <h2 class="card-heading">
          <span class="card-icon" aria-hidden="true">🚩</span>
          Red flags
        </h2>
        <ul id="red-flags" class="flag-list"></ul>
      </article>

      <div class="results-actions">
        <button type="button" id="copy-btn" class="btn btn-primary">
          <span id="copy-btn-label">Copy my results</span>
        </button>
        <a href="index.html" class="btn btn-secondary">Try again</a>
      </div>

      <p class="results-brand">What's your type?</p>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
